dataset:
  name: synthetic-analog-gauges

paths:
  raw_ds_path: data/raw/synthetic-analog-gauges
  processed_ds_path: data/processed

  train_inst_coco: annotations/instances_train.json
  val_inst_coco: annotations/instances_val.json
  test_inst_coco: annotations/instances_test.json

  train_reg_output_json: data/processed/synthetic-analog-gauges_reg/train_regression.jsonl
  val_reg_output_json: data/processed/synthetic-analog-gauges_reg/val_regression.jsonl
  test_reg_output_json: data/processed/synthetic-analog-gauges_reg/test_regression.jsonl

  weights_dir_reg: models/weights/synthetic-analog-gauges/reg_resnet18

regression_target:
  category_name: gauge
  value_key: reading_normalized

dial_crop:
  enabled: true
  pad_ratio: 0.08

transforms:
  img_size: 256
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  train:
    hflip_p: 0.0
    color_jitter_p: 0.3
    color_jitter: [0.2, 0.2, 0.2, 0.05]
    random_affine_p: 0.3
    degrees: 7
    translate: 0.02
    scale: [0.95, 1.05]
    blur_p: 0.2

model:
  backbone: resnet18
  pretrained: true
  dropout: 0.1

training:
  device: cuda
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 3e-4
  weight_decay: 1e-4
  optimizer: adamw
  amp: true
  seed: 42

  loss: mse

  best_metric: mae
  tol: 0.02
  log_every: 50

evaluation:
  split: test
  metrics:
    - mae
    - drr@0.02
  drr_tolerance: 0.02
